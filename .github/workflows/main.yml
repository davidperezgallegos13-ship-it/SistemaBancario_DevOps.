name: Pipeline Sistema Bancario

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Descargar Codigo de C#
      uses: actions/checkout@v4

    - name: 2. Configurar Entorno MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: 3. Configurar Gestor de Paquetes NuGet
      uses: NuGet/setup-nuget@v1.2.0

    - name: 4. Restaurar Paquetes NuGet
      run: nuget restore SistemaBancario.csproj
      shell: powershell

    - name: 5. Instalar Motor de Pruebas via NuGet
      run: nuget install Microsoft.TestPlatform -Version 17.8.0 -OutputDirectory Packages_Test

    - name: 6. Compilar Proyecto Principal
      run: msbuild SistemaBancario.csproj /p:Configuration=Debug /p:Platform="AnyCPU" /p:OutputPath="bin\Debug\" /p:BaseOutputPath="obj\"
      shell: powershell

    - name: 7. Ejecutar Pruebas Automatizadas
      run: |
        $vstestPath = Get-ChildItem -Path "Packages_Test" -Filter "vstest.console.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
        $targetDll = Get-ChildItem -Filter "*Test*.dll" -Recurse | Where-Object { $_.FullName -like "*bin\Debug*" } | Select-Object -First 1 -ExpandProperty FullName
        if ($targetDll) {
            & $vstestPath "$targetDll" /Platform:x64
        } else {
            Write-Host "Proyecto compilado con exito. No se detectaron pruebas pendientes."
        }
      shell: powershell
