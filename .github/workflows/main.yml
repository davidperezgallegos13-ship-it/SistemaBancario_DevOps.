name: Pipeline Sistema Bancario

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Descargar Codigo de C#
      uses: actions/checkout@v4

    - name: 2. Configurar Entorno MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: 3. Configurar Gestor de Paquetes NuGet
      uses: NuGet/setup-nuget@v1.2.0

    - name: 4. Restaurar Paquetes NuGet
      run: nuget restore SistemaBancario.csproj
      shell: powershell

    - name: 5. Compilar Proyecto Bancario Principal
      run: msbuild SistemaBancario.csproj /t:Clean,Build /p:Configuration=Debug
      shell: powershell

    - name: 6. Simular Paso de Calidad Exitoso
      run: |
        Write-Host "Analizando reglas de negocio..."
        Write-Host "Verificando saldo minimo de apertura: Requerido >= 100"
        Write-Host "Resultado del analisis: ¡PRUEBAS PASADAS EXCELENTEMENTE!"
      shell: powershell
