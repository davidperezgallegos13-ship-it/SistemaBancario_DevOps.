name: Pipeline Sistema Bancario

on:
  push:
    branches: [ "master", "main", "desarrollo" ]
  pull_request:
    branches: [ "master", "main", "desarrollo" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Descargar Codigo de C#
      uses: actions/checkout@v4

    - name: 2. Configurar Entorno MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: 3. Configurar Gestor de Paquetes NuGet
      uses: NuGet/setup-nuget@v1.2.0

    - name: 4. Buscar y Restaurar Paquetes NuGet
      run: |
        $csprojFiles = Get-ChildItem -Filter "*.csproj" -Recurse
        foreach ($file in $csprojFiles) {
            nuget restore $file.FullName
        }
      shell: powershell

    - name: 5. Instalar Motor de Pruebas via NuGet
      run: nuget install Microsoft.TestPlatform -Version 17.8.0 -OutputDirectory Packages_Test

    - name: 6. Compilar Proyectos con Rutas Explicitas
      run: |
        $csprojFiles = Get-ChildItem -Filter "*.csproj" -Recurse
        foreach ($file in $csprojFiles) {
            msbuild $file.FullName /p:Configuration=Debug /p:Platform="AnyCPU" /p:OutputPath="bin\Debug\" /p:BaseOutputPath="obj\"
        }
      shell: powershell

    - name: 7. Ejecutar Pruebas Unitarias Automatizadas
      run: |
        $vstestPath = Get-ChildItem -Path "Packages_Test" -Filter "vstest.console.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
        $targetDll = Get-ChildItem -Filter "SistemaBancario.Test.dll" -Recurse | Select-Object -First 1 -ExpandProperty FullName
        Write-Host "Archivo de pruebas localizado en: $targetDll"
        & $vstestPath "$targetDll" /Platform:x64
      shell: powershell
